<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - BusCrowdTrack</title>
  <link rel="stylesheet" href="css/bus-tracker.css">
</head>
<body class="auth-page">
  <script>
    (function () {
      var theme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <header class="header">
    <div class="header-logo">
      <div class="bus-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 16c0 .88.39 1.67 1 2.22V20c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h8v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1.78c.61-.55 1-1.34 1-2.22V6c0-3.5-3.58-4-8-4s-8 .5-8 4v10zm3.5 1c-.83 0-1.5-.67-1.5-1.5S6.67 14 7.5 14s1.5.67 1.5 1.5S8.33 17 7.5 17zm9 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm1.5-6H6V6h12v5z" fill="#fff"/></svg>
      </div>
      <span class="header-title">BusCrowdTrack</span>
    </div>
  </header>

  <aside class="sidebar">
    <div class="sidebar-section">
      <a href="login.html" class="sidebar-item">
        <span class="sidebar-icon icon-badge" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M10 17l1.41-1.41L8.83 13H20v-2H8.83l2.58-2.59L10 7l-7 7 7 7zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
        </span>
        <span>Login</span>
      </a>
      <a href="about.html" class="sidebar-item">
        <span class="sidebar-icon icon-badge" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
        </span>
        <span>About</span>
      </a>
    </div>
    <div class="sidebar-bottom">
      <a href="forgot-password.html" class="sidebar-item active">
        <span class="sidebar-icon icon-badge" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M12 1.75A10.25 10.25 0 1022.25 12 10.262 10.262 0 0012 1.75zm0 16a1.25 1.25 0 111.25-1.25A1.25 1.25 0 0112 17.75zm1.54-5.93a2.13 2.13 0 00-.79.66 1.58 1.58 0 00-.25.88v.39h-1.5v-.5a2.73 2.73 0 01.47-1.61 3.42 3.42 0 011.14-1 4.13 4.13 0 001-.78 1.35 1.35 0 00.3-.92 1.44 1.44 0 00-.46-1.1 1.77 1.77 0 00-1.25-.42 1.94 1.94 0 00-1.34.47 1.92 1.92 0 00-.58 1.23H8.79a3.19 3.19 0 01.99-2.2 3.45 3.45 0 012.43-.84 3.41 3.41 0 012.31.74 2.55 2.55 0 01.85 2.03 2.52 2.52 0 01-.45 1.48 4.08 4.08 0 01-1.38 1.1z"/></svg>
        </span>
        <span>Reset password</span>
      </a>
    </div>
  </aside>

  <main class="main-content">
    <div class="content-card">
      <h1>Set a New Password</h1>
      <p id="resetPasswordStatus" class="auth-status">Verifying your secure reset link...</p>
      <form id="resetPasswordForm">
        <div class="form-group">
          <label for="resetEmail">Registered Email</label>
          <div class="input-wrapper">
            <span class="input-icon icon-person">&#9993;</span>
            <input type="email" id="resetEmail" name="resetEmail" readonly>
          </div>
        </div>
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <div class="input-wrapper">
            <span class="input-icon icon-lock">&#128274;</span>
            <input type="password" id="newPassword" name="newPassword" placeholder="Enter your new password" required>
          </div>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm New Password</label>
          <div class="input-wrapper">
            <span class="input-icon icon-lock">&#128274;</span>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your new password" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
        <p class="register-link">Need a new link? <a href="forgot-password.html">Request another password reset</a>.</p>
      </form>
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script>
    document.getElementById('resetPasswordForm').addEventListener('submit', function(e) {
      e.preventDefault();
      if (typeof resetPassword === 'function') resetPassword();
    });
    if (typeof validateResetLink === 'function') validateResetLink();
  </script>
</body>
</html>
