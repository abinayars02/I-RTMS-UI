      document.documentElement.setAttribute('data-theme', theme);

  <main class="main-content">
    <div class="content-card">
      <div class="content-card-header">
        <h1>
          <span class="feature-icon" aria-hidden="true" style="background: rgba(34, 197, 94, 0.14); color: var(--btn-green);">
            <svg viewBox="0 0 24 24"><path d="M12 2c-4.418 0-8 3.582-8 8 0 5.5 8 12 8 12s8-6.5 8-12c0-4.418-3.582-8-8-8zm0 11a3 3 0 110-6 3 3 0 010 6z"/></svg>

          Live Bus Location <span id="busNumberBadge" class="bus-number-badge"></span>
        </h1>
        <div class="content-card-header-actions">
          <div id="passengerCountBadge" class="bus-number-badge" title="Passenger count (live)">Passengers: --</div>
          <button type="button" class="btn btn-ghost" onclick="handleBack()">

              <svg viewBox="0 0 24 24" style="width:18px;height:18px;"><path d="M15 5l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>

      <p id="routeDirection" class="route-direction"></p>

      <ul class="route-schedule" id="routeSchedule"></ul>
    </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/api.js"></script>
  <script>
    var params = new URLSearchParams(window.location.search);
    var routeId = params.get('id');
    var fromPlace = params.get('from');
    var toPlace = params.get('to');
    var selectedBusNumber = params.get('bus');
    var map, busMarker, sourceMarker, destinationMarker, selectedSourceMarker, selectedDestinationMarker;
    var etaControl;
    var liveStatusControl;
    var livePoll = null;
    var passengerPoll = null;
    var liveRefreshHandler = null;
    var busAnimationFrame = null;
    var currentRouteStops = [];
    var fullRouteCoords = [];
    var currentRouteCoords = [];
    var currentStopMarkerCoords = [];
    var selectedStopMarkerCoords = [];
    var latestLiveLocation = null;
    var latestEtaText = 'ETA will appear here';
    var routePolyline = null;
    var currentRouteMeta = null;
    var atlasRouteId = '';

    function loadRouteDetails() {
      if (!routeId) {
        document.querySelector('.content-card').innerHTML = '<h1>No route selected</h1>';
        return;
      }

      getRouteDetails(routeId, fromPlace, toPlace, selectedBusNumber).then(function(route) {
        if (route.message) {
          document.querySelector('.content-card').innerHTML = '<h1>Route not found</h1>';
          return;
        }

        var coords = (route.coordinates || []).map(function(c) { return [c.lat, c.lng]; });
        atlasRouteId = getAtlasRouteId(routeId);

        if (coords.length < 2) {
          document.querySelector('.content-card').innerHTML = '<h1>Invalid route data</h1>';
          return;
        }

        fullRouteCoords = coords.slice();
        currentRouteMeta = {
          routeId: routeId,
          busNumber: route.busNumber || selectedBusNumber || '',
          from: route.from || fromPlace || 'Source',
          to: route.to || toPlace || 'Destination'
        };

        var badge = document.getElementById('busNumberBadge');
        if (badge) badge.textContent = currentRouteMeta.busNumber ? 'Bus ' + currentRouteMeta.busNumber : '';
        var dirEl = document.getElementById('routeDirection');
        if (dirEl && route.from && route.to) dirEl.textContent = 'Route: ' + route.from + ' -> ' + route.to;

        Promise.all([
          fetchTripSegment({ routeId: atlasRouteId, from: fromPlace, to: toPlace }),
          fetchRouteStops({ routeId: atlasRouteId }).catch(function() { return []; }),
          fetchStopByName({ routeId: atlasRouteId, name: fromPlace }),
          fetchStopByName({ routeId: atlasRouteId, name: toPlace })
        ]).then(function(results) {
          var segment = results[0];
          var fullRouteStops = Array.isArray(results[1]) ? results[1].filter(function(stop) { return stop && stop.name; }) : [];
          var selectedSourceCoord = Array.isArray(results[2]) ? results[2] : null;
          var selectedDestinationCoord = Array.isArray(results[3]) ? results[3] : null;
          var defaultStartCoord = getStopCoordByName(fullRouteStops, 'Alangulam Bus Stand');
          var defaultEndCoord = getStopCoordByName(fullRouteStops, 'Surandai Bus Stand');
          var atlasFullRouteCoords = getCoordsFromStops(fullRouteStops);
          if (atlasFullRouteCoords.length >= 2) {
            fullRouteCoords = atlasFullRouteCoords.slice();
          }
          currentRouteStops = Array.isArray(segment && segment.stops) ? segment.stops.filter(function(stop) { return stop && stop.name; }) : [];
          selectedStopMarkerCoords = getSegmentCoordsFromStops(fullRouteStops, fromPlace, toPlace);

          currentRouteCoords = selectedStopMarkerCoords.length >= 2
            ? selectedStopMarkerCoords.slice()
            : fullRouteCoords.slice();
          currentStopMarkerCoords = currentRouteCoords.slice();

          if (currentRouteCoords.length < 2) {
            currentRouteCoords = coords.slice();
          }

          fetchRoadPathThroughStops(currentRouteCoords).then(function(roadCoords) {
            currentRouteCoords = roadCoords && roadCoords.length >= 2 ? roadCoords : currentRouteCoords;

            map = L.map('map').setView(currentRouteCoords[0], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap contributors' }).addTo(map);
            addEtaControl(map);
            addLiveStatusControl(map);
            drawRouteSegment(currentRouteCoords);
            createTerminalMarkers(
              defaultStartCoord || fullRouteCoords[0],
              defaultEndCoord || fullRouteCoords[fullRouteCoords.length - 1],
              'Alangulam',
              'Surandai'
            );
            createSelectedStopMarkers(
              selectedSourceCoord || currentRouteCoords[0],
              selectedDestinationCoord || currentRouteCoords[currentRouteCoords.length - 1]
            );

            busMarker = L.marker(currentRouteCoords[0], { icon: createBusIcon(currentRouteMeta.busNumber), opacity: 0 }).addTo(map);
            fitMapToCoords(currentRouteCoords.concat(
              selectedSourceCoord ? [selectedSourceCoord] : [],
              selectedDestinationCoord ? [selectedDestinationCoord] : []
            ));
            renderSchedule(currentRouteStops);
            updateEtaText();
            startPassengerCount(routeId, currentRouteMeta.busNumber);
            startLiveLocation();
          });
        }).catch(function(error) {
          if (typeof isAuthError === 'function' && isAuthError(error)) return;
          document.querySelector('.content-card').innerHTML = '<h1>Error loading route</h1>';
        });
      }).catch(function(error) {
        if (typeof isAuthError === 'function' && isAuthError(error)) return;
        document.querySelector('.content-card').innerHTML = '<h1>Error loading route</h1>';
      });
    }

    function addEtaControl(targetMap) {
      etaControl = L.control({ position: 'topleft' });
      etaControl.onAdd = function() {
        var div = L.DomUtil.create('div', 'eta-control');
        div.innerHTML =
          '<button type="button" id="etaBtn">Check ETA</button>' +
          '<div class="eta-text" id="etaText">ETA will appear here</div>';
        L.DomEvent.disableClickPropagation(div);
        return div;
      };
      etaControl.addTo(targetMap);

      setTimeout(function() {
        var btn = document.getElementById('etaBtn');
        if (!btn) return;
        btn.addEventListener('click', function() {
          var out = document.getElementById('etaText');
          if (out) out.textContent = latestEtaText;
        });
      }, 0);
    }

    function addLiveStatusControl(targetMap) {
      liveStatusControl = L.control({ position: 'topright' });
      liveStatusControl.onAdd = function() {
        var div = L.DomUtil.create('div', 'eta-control');
        div.innerHTML = '<div class="eta-text" id="liveLocationStatus" role="button" tabindex="0" style="cursor:pointer;">Live</div>';
        L.DomEvent.disableClickPropagation(div);
        return div;
      };
      liveStatusControl.addTo(targetMap);
      setLiveStatus('Live');

      setTimeout(function() {
        var el = document.getElementById('liveLocationStatus');
        if (!el) return;
        el.addEventListener('click', function() {
          if (typeof liveRefreshHandler === 'function') liveRefreshHandler(true);
        });
        el.addEventListener('keydown', function(event) {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            if (typeof liveRefreshHandler === 'function') liveRefreshHandler(true);
          }
        });
      }, 0);
    }

    function setLiveStatus(message) {
      var el = document.getElementById('liveLocationStatus');
      if (el) el.textContent = message;
    }

    function renderSchedule(stops) {
      var ul = document.getElementById('routeSchedule');
      if (!ul) return;
      ul.innerHTML = '';

      getScheduleStops(stops).forEach(function(stop, i) {
        var li = document.createElement('li');
        var timingValue = stop.display_arrival_time || stop.arrival_time;
        var timing = timingValue ? ' - ' + timingValue : '';
        li.innerHTML = '<div class="route-schedule-number">' + (i + 1) + '</div><div><strong>Stop ' + (i + 1) + ': ' + stop.name + timing + '</strong></div>';
        ul.appendChild(li);
      });
    }

    function normalizeScheduleStopName(value) {
      var normalized = String(value || '').trim().replace(/\s+/g, ' ').toLowerCase();
      var aliases = {
        'surandai': 'surandai bus stand',
        'alangulam': 'alangulam bus stand',
        'bungalow surandai': 'bungalow stop',
        'athiyoothu': 'athiyuthu'
      };
      return aliases[normalized] || normalized;
    }

    function getScheduleStops(stops) {
      var scheduleStops = getChronologicalStops((stops || []).filter(function(stop) {
        return stop && stop.name;
      }));

      if (!scheduleStops.length) return [];

      var sourceKey = normalizeScheduleStopName(fromPlace);
      var destinationKey = normalizeScheduleStopName(toPlace);

      if (sourceKey && destinationKey) {
        var sourceIndex = scheduleStops.findIndex(function(stop) {
          return normalizeScheduleStopName(stop.name) === sourceKey;
        });
        var destinationIndex = scheduleStops.findIndex(function(stop) {
          return normalizeScheduleStopName(stop.name) === destinationKey;
        });

        if (sourceIndex !== -1 && destinationIndex !== -1) {
          scheduleStops = sourceIndex <= destinationIndex
            ? scheduleStops.slice(sourceIndex, destinationIndex + 1)
            : scheduleStops.slice(destinationIndex, sourceIndex + 1).reverse();
        }
      }

      var seen = {};
      scheduleStops = scheduleStops.filter(function(stop) {
        var key = normalizeScheduleStopName(stop.name);
        if (!key || seen[key]) return false;
        seen[key] = true;
        return true;
      });

      return assignIncreasingScheduleTimes(scheduleStops);
    }

    function assignIncreasingScheduleTimes(stops) {
      var scheduleStops = (stops || []).map(function(stop) {
        return Object.assign({}, stop);
      });

      var timedStops = scheduleStops.map(function(stop, index) {
        return {
          index: index,
          raw: stop.arrival_time || '',
          minutes: parseArrivalMinutes(stop.arrival_time)
        };
      }).filter(function(item) {
        return item.raw && item.minutes != null;
      });

      if (timedStops.length < 2) return scheduleStops;

      var hasDecrease = false;
      for (var i = 1; i < timedStops.length; i += 1) {
        if (timedStops[i].minutes < timedStops[i - 1].minutes) {
          hasDecrease = true;
          break;
        }
      }

      if (!hasDecrease) return scheduleStops;

      var sortedTimes = timedStops.slice().sort(function(a, b) {
        return a.minutes - b.minutes;
      });

      timedStops.forEach(function(item, index) {
        scheduleStops[item.index].display_arrival_time = sortedTimes[index].raw;
      });

      return scheduleStops;
    }

    function startPassengerCount(currentRouteId, busNum) {
      var badge = document.getElementById('passengerCountBadge');
      if (!badge) return;
      if (passengerPoll) {
        clearInterval(passengerPoll);
        passengerPoll = null;
      }

      var state = {
        inside: null,
        entered: null,
        exited: null
      };
      var inFlight = false;
      var requestToken = 0;

      function renderCount(next) {
        var inside = typeof next.inside === 'number' ? next.inside : state.inside;
        var entered = typeof next.entered === 'number' ? next.entered : state.entered;
        var exited = typeof next.exited === 'number' ? next.exited : state.exited;
        state.inside = inside;
        state.entered = entered;
        state.exited = exited;
        badge.textContent =
          'Passengers ' + (inside == null ? '--' : inside);
      }

      // 'Passengers | Inside: ' + (inside == null ? '--' : inside) +
      //     ' | Entered: ' + (entered == null ? '--' : entered) +
      //     ' | Exited: ' + (exited == null ? '--' : exited);

      async function refresh() {
        if (inFlight) return;
        inFlight = true;
        requestToken += 1;
        var token = requestToken;
        try {
          var latest = await fetchPassengerCount({
            routeId: currentRouteId,
            busNumber: busNum,
            maxAgeMs: 0
          });
          if (token !== requestToken) return;
          if (latest && typeof latest === 'object') {
            renderCount(latest);
          }
        } catch (_) {
          renderCount({});
        } finally {
          inFlight = false;
        }
      }

      renderCount({});
      refresh();
      passengerPoll = setInterval(function() {
        refresh();
      }, 3000);
    }

    function startLiveLocation() {
      if (!busMarker) return;
      if (livePoll) {
        clearInterval(livePoll);
        livePoll = null;
      }

      function markUnavailable() {
        latestLiveLocation = null;
        busMarker.setOpacity(0);
        setLiveStatus('Live');
        updateEtaText();
      }

      function apply(lat, lng, shouldFocus) {
        latestLiveLocation = [lat, lng];
        animateBusMarker(latestLiveLocation);
        setLiveStatus('Live');
        if (shouldFocus && map) {
          map.setView(latestLiveLocation, Math.max(map.getZoom(), 13));
        }
        updateEtaText();
      }

      function refresh(shouldFocus) {
        fetchLiveLocation({ routeId: atlasRouteId || routeId }).then(function(loc) {
          var lat = loc && typeof loc.lat === 'number' ? loc.lat : null;
          var lng = loc && typeof loc.lng === 'number' ? loc.lng : null;
          if (typeof lat === 'number' && typeof lng === 'number') {
            apply(lat, lng, shouldFocus);
          } else {
            markUnavailable();
          }
        }).catch(function() {
          markUnavailable();
        });
      }

      liveRefreshHandler = refresh;
      refresh(false);
      livePoll = setInterval(function() { refresh(false); }, 3000);
    }

    function parseArrivalMinutes(value) {
      var raw = String(value || '').trim();
      if (!raw) return null;

      var match12 = raw.match(/^(\d{1,2}):(\d{2})\s*([AaPp][Mm])$/);
      if (match12) {
        var hour = parseInt(match12[1], 10);
        var minute = parseInt(match12[2], 10);
        var suffix = match12[3].toUpperCase();
        if (suffix === 'PM' && hour !== 12) hour += 12;
        if (suffix === 'AM' && hour === 12) hour = 0;
        return hour * 60 + minute;
      }

      var match24 = raw.match(/^(\d{1,2}):(\d{2})$/);
      if (match24) return parseInt(match24[1], 10) * 60 + parseInt(match24[2], 10);

      var match24Seconds = raw.match(/^(\d{1,2}):(\d{2}):(\d{2})$/);
      if (match24Seconds) return parseInt(match24Seconds[1], 10) * 60 + parseInt(match24Seconds[2], 10);

      return null;
    }

    function fitMapToCoords(coords) {
      if (!map || !coords || !coords.length) return;
      if (coords.length === 1) {
        map.setView(coords[0], 14);
        return;
      }
      map.fitBounds(L.latLngBounds(coords).pad(0.1));
    }

    function drawRouteSegment(coords) {
      if (!map || !coords || !coords.length) return;
      if (routePolyline) map.removeLayer(routePolyline);
      routePolyline = L.polyline(coords, { color: '#28a745', weight: 5 }).addTo(map);
    }

    function createBusIcon(busNum) {
      return L.divIcon({
        className: 'bus-marker',
        html: '<div style="width:28px;height:28px;background:#e9a319;border:2px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;color:#fff;"></div>',
        iconSize: [28, 28],
        iconAnchor: [14, 14]
      });
    }

    function createTerminalIcon(label, color) {
      return L.divIcon({
        className: 'route-terminal-marker',
        html: '<div style="min-width:34px;height:34px;padding:0 8px;background:' + color + ';border:2px solid #fff;border-radius:17px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;box-shadow:0 4px 12px rgba(15,23,42,0.25);">' + label + '</div>',
        iconSize: [34, 34],
        iconAnchor: [17, 17]
      });
    }

    function createTerminalMarkers(startCoord, endCoord, startLabel, endLabel) {
      if (!map || !startCoord || !endCoord) return;
      if (sourceMarker) map.removeLayer(sourceMarker);
      if (destinationMarker) map.removeLayer(destinationMarker);

      sourceMarker = L.marker(startCoord, { icon: createTerminalIcon('Start', '#198754') })
        .addTo(map)
        .bindPopup('<b>Source</b><br>' + escapeHtml(startLabel || 'Source'));

      destinationMarker = L.marker(endCoord, { icon: createTerminalIcon('End', '#dc3545') })
        .addTo(map)
        .bindPopup('<b>Destination</b><br>' + escapeHtml(endLabel || 'Destination'));
    }

    function createSelectedStopMarkers(startCoord, endCoord) {
      if (!map || !startCoord || !endCoord) return;
      if (selectedSourceMarker) map.removeLayer(selectedSourceMarker);
      if (selectedDestinationMarker) map.removeLayer(selectedDestinationMarker);

      selectedSourceMarker = L.marker(startCoord, { icon: createTerminalIcon('Src', '#0d6efd'), zIndexOffset: 1000 })
        .addTo(map)
        .bindPopup('<b>Selected Source</b><br>' + escapeHtml(currentRouteMeta && currentRouteMeta.from ? currentRouteMeta.from : 'Source'));

      selectedDestinationMarker = L.marker(endCoord, { icon: createTerminalIcon('Dst', '#fd7e14'), zIndexOffset: 1000 })
        .addTo(map)
        .bindPopup('<b>Selected Destination</b><br>' + escapeHtml(currentRouteMeta && currentRouteMeta.to ? currentRouteMeta.to : 'Destination'));
    }

    function getAtlasRouteId(value) {
      var raw = String(value || '').trim();
      if (!raw) return raw;
      var normalized = raw.replace(/([0-9])([A-Za-z]+)$/, '$1');
      return normalized || raw;
    }

    function getCoordsFromStops(stops) {
      return (stops || []).map(function(stop) {
        var lat = typeof stop.latitude === 'number' ? stop.latitude : Number(stop.latitude);
        var lng = typeof stop.longitude === 'number' ? stop.longitude : Number(stop.longitude);
        if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null;
        return [lat, lng];
      }).filter(function(coord) {
        return Array.isArray(coord) && coord.length === 2;
      });
    }

    function getStopCoordByName(stops, name) {
      var key = normalizeScheduleStopName(name);
      for (var i = 0; i < (stops || []).length; i += 1) {
        var stop = stops[i];
        if (normalizeScheduleStopName(stop && stop.name) !== key) continue;
        var lat = stop && (typeof stop.latitude === 'number' ? stop.latitude : Number(stop.latitude));
        var lng = stop && (typeof stop.longitude === 'number' ? stop.longitude : Number(stop.longitude));
        if (Number.isFinite(lat) && Number.isFinite(lng)) return [lat, lng];
      }
      return null;
    }

    function getCoordsForNamedStops(fullRouteStops, selectedStops) {
      if (!Array.isArray(fullRouteStops) || !fullRouteStops.length || !Array.isArray(selectedStops) || !selectedStops.length) return [];

      var fullStopMap = {};
      fullRouteStops.forEach(function(stop) {
        var key = normalizeScheduleStopName(stop && stop.name);
        var lat = stop && (typeof stop.latitude === 'number' ? stop.latitude : Number(stop.latitude));
        var lng = stop && (typeof stop.longitude === 'number' ? stop.longitude : Number(stop.longitude));
        if (!key || !Number.isFinite(lat) || !Number.isFinite(lng) || fullStopMap[key]) return;
        fullStopMap[key] = [lat, lng];
      });

      return selectedStops.map(function(stop) {
        return fullStopMap[normalizeScheduleStopName(stop && stop.name)] || null;
      }).filter(function(coord) {
        return Array.isArray(coord) && coord.length === 2;
      });
    }

    function getSegmentCoordsFromStops(fullRouteStops, fromName, toName) {
      if (!Array.isArray(fullRouteStops) || fullRouteStops.length < 2) return [];

      var sourceKey = normalizeScheduleStopName(fromName);
      var destinationKey = normalizeScheduleStopName(toName);
      var sourceIndex = fullRouteStops.findIndex(function(stop) {
        return normalizeScheduleStopName(stop && stop.name) === sourceKey;
      });
      var destinationIndex = fullRouteStops.findIndex(function(stop) {
        return normalizeScheduleStopName(stop && stop.name) === destinationKey;
      });

      var orderedStops = fullRouteStops.slice();
      if (sourceIndex !== -1 && destinationIndex !== -1 && sourceIndex !== destinationIndex) {
        orderedStops = sourceIndex < destinationIndex
          ? fullRouteStops.slice(sourceIndex, destinationIndex + 1)
          : fullRouteStops.slice(destinationIndex, sourceIndex + 1).reverse();
      }

      return getCoordsFromStops(orderedStops);
    }

    function normalizeScheduleMinutes(stops) {
      var last = null;
      return (stops || []).map(function(stop) {
        var minutes = parseArrivalMinutes(stop.arrival_time);
        if (minutes == null) return null;
        while (last != null && minutes < last) minutes += 24 * 60;
        last = minutes;
        return minutes;
      });
    }

    function getChronologicalStops(stops) {
      return (stops || []).slice().sort(function(a, b) {
        var orderA = typeof a.order === 'number' ? a.order : Number(a.order);
        var orderB = typeof b.order === 'number' ? b.order : Number(b.order);
        var hasOrderA = Number.isFinite(orderA);
        var hasOrderB = Number.isFinite(orderB);
        if (hasOrderA && hasOrderB && orderA !== orderB) return orderA - orderB;

        var timeA = parseArrivalMinutes(a.arrival_time);
        var timeB = parseArrivalMinutes(b.arrival_time);
        var hasTimeA = timeA != null;
        var hasTimeB = timeB != null;
        if (hasTimeA && hasTimeB && timeA !== timeB) return timeA - timeB;

        return String(a.name || '').localeCompare(String(b.name || ''));
      });
    }

    function getDistance(a, b) {
      var earthRadius = 6371000;
      var lat1 = a[0] * Math.PI / 180;
      var lat2 = b[0] * Math.PI / 180;
      var dLat = (b[0] - a[0]) * Math.PI / 180;
      var dLng = (b[1] - a[1]) * Math.PI / 180;
      var sinLat = Math.sin(dLat / 2);
      var sinLng = Math.sin(dLng / 2);
      var hav = sinLat * sinLat + Math.cos(lat1) * Math.cos(lat2) * sinLng * sinLng;
      return 2 * earthRadius * Math.atan2(Math.sqrt(hav), Math.sqrt(1 - hav));
    }

    function getCumulativeLengths(coords) {
      var totals = [0];
      for (var i = 1; i < coords.length; i += 1) {
        totals.push(totals[i - 1] + getDistance(coords[i - 1], coords[i]));
      }
      return totals;
    }

    function interpolatePointOnCoords(coords, fraction) {
      if (!coords || !coords.length) return null;
      if (coords.length === 1) return coords[0].slice();

      var clamped = Math.max(0, Math.min(1, fraction));
      var cumulative = getCumulativeLengths(coords);
      var total = cumulative[cumulative.length - 1];
      if (!total) return coords[0].slice();
      var target = total * clamped;

      for (var i = 0; i < coords.length - 1; i += 1) {
        var startLength = cumulative[i];
        var endLength = cumulative[i + 1];
        if (target <= endLength || i === coords.length - 2) {
          var segmentLength = endLength - startLength;
          var ratio = segmentLength ? (target - startLength) / segmentLength : 0;
          return [
            coords[i][0] + (coords[i + 1][0] - coords[i][0]) * ratio,
            coords[i][1] + (coords[i + 1][1] - coords[i][1]) * ratio
          ];
        }
      }

      return coords[coords.length - 1].slice();
    }

    function getCoordsBetweenFractions(coords, startFraction, endFraction) {
      if (!coords || !coords.length) return [];
      if (coords.length === 1) return [coords[0].slice()];

      var start = Math.max(0, Math.min(1, startFraction));
      var end = Math.max(0, Math.min(1, endFraction));
      if (end < start) {
        var temp = start;
        start = end;
        end = temp;
      }

      var cumulative = getCumulativeLengths(coords);
      var total = cumulative[cumulative.length - 1];
      if (!total) return coords.slice();

      var startDistance = total * start;
      var endDistance = total * end;
      var segmentCoords = [interpolatePointOnCoords(coords, start)];

      for (var i = 1; i < coords.length - 1; i += 1) {
        if (cumulative[i] > startDistance && cumulative[i] < endDistance) {
          segmentCoords.push(coords[i].slice());
        }
      }

      segmentCoords.push(interpolatePointOnCoords(coords, end));
      return segmentCoords;
    }

    function getCoordsForSelectedSegment(coords, startFraction, endFraction, reverse) {
      if (!coords || !coords.length) return [];
      var segmentCoords = getCoordsBetweenFractions(coords, startFraction, endFraction);
      return reverse ? segmentCoords.slice().reverse() : segmentCoords;
    }

    function getMarkerCoordsForStops(coords, stops) {
      if (!coords || !coords.length || !Array.isArray(stops) || !stops.length) return [];
      return stops.map(function(stop) {
        var fraction = typeof stop.route_fraction === 'number'
          ? stop.route_fraction
          : (typeof stop.segment_fraction === 'number' ? stop.segment_fraction : 0);
        return interpolatePointOnCoords(coords, fraction);
      }).filter(function(coord) {
        return Array.isArray(coord) && coord.length === 2;
      });
    }

    function projectCoordToRoute(coords, liveCoord) {
      if (!coords || coords.length < 2 || !liveCoord) return null;

      var cumulative = [0];
      for (var i = 1; i < coords.length; i += 1) {
        cumulative.push(cumulative[i - 1] + getDistance(coords[i - 1], coords[i]));
      }

      var total = cumulative[cumulative.length - 1];
      if (!total) {
        return { coordinate: coords[0].slice(), progress: 0 };
      }

      var bestDistance = Infinity;
      var bestCoordinate = coords[0].slice();
      var bestProgress = 0;

      for (var j = 0; j < coords.length - 1; j += 1) {
        var start = coords[j];
        var end = coords[j + 1];
        var ax = start[1];
        var ay = start[0];
        var bx = end[1];
        var by = end[0];
        var px = liveCoord[1];
        var py = liveCoord[0];
        var dx = bx - ax;
        var dy = by - ay;
        var lenSq = dx * dx + dy * dy;
        var t = lenSq ? ((px - ax) * dx + (py - ay) * dy) / lenSq : 0;
        if (t < 0) t = 0;
        if (t > 1) t = 1;

        var projected = [ay + (by - ay) * t, ax + (bx - ax) * t];
        var distance = getDistance(liveCoord, projected);
        if (distance < bestDistance) {
          bestDistance = distance;
          bestCoordinate = projected;
          bestProgress = (cumulative[j] + getDistance(start, end) * t) / total;
        }
      }

      return {
        coordinate: bestCoordinate,
        progress: bestProgress
      };
    }

    function getProgressFraction(coords, liveCoord) {
      var snapped = projectCoordToRoute(coords, liveCoord);
      return snapped ? snapped.progress : 0;
    }

    function formatEtaMinutes(value, hasArrived) {
      var safeMinutes = Number(value);
      if (hasArrived) return 'Arrived';
      if (!Number.isFinite(safeMinutes)) return '--';
      return Math.max(0, Math.round(safeMinutes)) + ' mins';
    }

    function getSelectedSegmentEtaMinutes() {
      var scheduleStops = getScheduleStops(currentRouteStops);
      if (!scheduleStops || scheduleStops.length < 2) return null;

      var startStop = scheduleStops[0];
      var endStop = scheduleStops[scheduleStops.length - 1];
      var startMinutes = parseArrivalMinutes((startStop && (startStop.display_arrival_time || startStop.arrival_time)) || '');
      var endMinutes = parseArrivalMinutes((endStop && (endStop.display_arrival_time || endStop.arrival_time)) || '');

      if (startMinutes == null || endMinutes == null) return null;
      while (endMinutes < startMinutes) endMinutes += 24 * 60;
      return Math.max(0, endMinutes - startMinutes);
    }

    function updateEtaText() {
      var out = document.getElementById('etaText');
      var selectedSegmentEtaMinutes = getSelectedSegmentEtaMinutes();
      if (selectedSegmentEtaMinutes != null) {
        latestEtaText = formatEtaMinutes(selectedSegmentEtaMinutes, selectedSegmentEtaMinutes <= 0);
        if (out) out.textContent = latestEtaText;
        return;
      }

      latestEtaText = '--';
      if (out) out.textContent = latestEtaText;
    }

    function animateBusMarker(targetCoord) {
      if (!busMarker || !targetCoord || targetCoord.length !== 2) return;
      if (busAnimationFrame) {
        cancelAnimationFrame(busAnimationFrame);
        busAnimationFrame = null;
      }

      var start = busMarker.getLatLng();
      var startCoord = [start.lat, start.lng];
      var endCoord = targetCoord.slice();
      var startTime = null;
      var duration = 900;
      busMarker.setOpacity(1);

      function step(timestamp) {
        if (!startTime) startTime = timestamp;
        var progress = Math.min(1, (timestamp - startTime) / duration);
        var eased = 1 - Math.pow(1 - progress, 3);
        busMarker.setLatLng([
          startCoord[0] + (endCoord[0] - startCoord[0]) * eased,
          startCoord[1] + (endCoord[1] - startCoord[1]) * eased
        ]);
        if (progress < 1) {
          busAnimationFrame = requestAnimationFrame(step);
        } else {
          busAnimationFrame = null;
        }
      }

      busAnimationFrame = requestAnimationFrame(step);
    }

    function fetchRoadRoute(startCoord, endCoord) {
      if (!startCoord || !endCoord) return Promise.resolve([]);

      var start = String(startCoord[1]) + ',' + String(startCoord[0]);
      var end = String(endCoord[1]) + ',' + String(endCoord[0]);
      var url = 'https://router.project-osrm.org/route/v1/driving/' + start + ';' + end + '?overview=full&geometries=geojson&alternatives=false&steps=false';

      return fetch(url, { cache: 'no-store' })
        .then(function(res) {
          if (!res.ok) throw new Error('Routing failed');
          return res.json();
        })
        .then(function(data) {
          var route = data && Array.isArray(data.routes) && data.routes.length ? data.routes[0] : null;
          var geometry = route && route.geometry && Array.isArray(route.geometry.coordinates) ? route.geometry.coordinates : [];
          return geometry.map(function(coord) {
            return [coord[1], coord[0]];
          }).filter(function(coord) {
            return Array.isArray(coord) && coord.length === 2;
          });
        })
        .catch(function() {
          return [];
        });
    }

    function fetchRoadPathThroughStops(stopCoords) {
      if (!Array.isArray(stopCoords) || stopCoords.length < 2) return Promise.resolve(stopCoords || []);

      var segments = [];
      for (var i = 0; i < stopCoords.length - 1; i += 1) {
        segments.push(fetchRoadRoute(stopCoords[i], stopCoords[i + 1]));
      }

      return Promise.all(segments).then(function(results) {
        var stitched = [];

        results.forEach(function(coords, index) {
          var startCoord = stopCoords[index];
          var endCoord = stopCoords[index + 1];
          var safeCoords = Array.isArray(coords) && coords.length >= 2
            ? coords.slice()
            : [startCoord, endCoord];

          if (!sameCoord(safeCoords[0], startCoord)) {
            safeCoords.unshift(startCoord);
          }
          if (!sameCoord(safeCoords[safeCoords.length - 1], endCoord)) {
            safeCoords.push(endCoord);
          }

          safeCoords.forEach(function(coord, coordIndex) {
            if (index > 0 && coordIndex === 0) return;
            stitched.push(coord);
          });
        });

        return stitched.length >= 2 ? stitched : stopCoords.slice();
      }).catch(function() {
        return stopCoords.slice();
      });
    }

    function sameCoord(a, b) {
      if (!Array.isArray(a) || !Array.isArray(b) || a.length !== 2 || b.length !== 2) return false;
      return Math.abs(a[0] - b[0]) < 0.000001 && Math.abs(a[1] - b[1]) < 0.000001;
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function handleLogout() {
      if (confirm('Logout?')) {
        localStorage.removeItem('isLoggedIn');
        localStorage.removeItem('username');
        localStorage.removeItem('token');
        window.location.href = 'logout.html';
      }
    }

    function handleBack() {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = 'search.html';
      }
    }

    ensureAuthenticated().then(function(ok) {
      if (!ok) return;
      loadRouteDetails();
    }).catch(function(error) {
      if (typeof isAuthError === 'function' && isAuthError(error)) return;
      document.querySelector('.content-card').innerHTML = '<h1>Error loading route</h1>';
    });
  </script>
</body>
