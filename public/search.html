<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Bus - BusCrowdTrack</title>
  <link rel="stylesheet" href="css/bus-tracker.css">
</head>
<body>
  <script>
    if (localStorage.getItem('isLoggedIn') !== 'true') { window.location.href = 'login.html'; }
  </script>
  <script>
    (function () {
      var theme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <header class="header">
    <div class="header-logo">
      <div class="bus-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 16c0 .88.39 1.67 1 2.22V20c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h8v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1.78c.61-.55 1-1.34 1-2.22V6c0-3.5-3.58-4-8-4s-8 .5-8 4v10zm3.5 1c-.83 0-1.5-.67-1.5-1.5S6.67 14 7.5 14s1.5.67 1.5 1.5S8.33 17 7.5 17zm9 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm1.5-6H6V6h12v5z" fill="#fff"/></svg>
      </div>
      <span class="header-title">BusCrowdTrack</span>
    </div>
  </header>

  <aside class="sidebar">
    <div class="sidebar-section">
      <a href="search.html" class="sidebar-item active">
        <span class="sidebar-icon icon-badge" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M10 2a8 8 0 105.293 14.293l4.707 4.707 1.414-1.414-4.707-4.707A8 8 0 0010 2zm0 2a6 6 0 110 12 6 6 0 010-12z"/></svg>
        </span>
        <span>Search Bus</span>
      </a>
      <a href="profile.html" class="sidebar-item">
        <span class="sidebar-icon icon-badge" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M12 12a4 4 0 100-8 4 4 0 000 8zm0 2c-4.418 0-8 2.239-8 5v1h16v-1c0-2.761-3.582-5-8-5z"/></svg>
        </span>
        <span>Profile</span>
      </a>
      <a href="about.html" class="sidebar-item">
        <span class="sidebar-icon icon-badge" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
        </span>
        <span>About</span>
      </a>
      <a href="settings.html" class="sidebar-item">
        <span class="sidebar-icon icon-badge" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M19.14 12.94a7.43 7.43 0 000-1.88l2.03-1.58a.5.5 0 00.12-.64l-1.92-3.32a.5.5 0 00-.6-.22l-2.39.96a7.28 7.28 0 00-1.63-.94l-.36-2.54a.5.5 0 00-.5-.42h-3.84a.5.5 0 00-.5.42l-.36 2.54a7.28 7.28 0 00-1.63.94l-2.39-.96a.5.5 0 00-.6.22L2.68 8.84a.5.5 0 00.12.64l2.03 1.58a7.43 7.43 0 000 1.88l-2.03 1.58a.5.5 0 00-.12.64l1.92 3.32a.5.5 0 00.6.22l2.39-.96c.5.38 1.05.7 1.63.94l.36 2.54a.5.5 0 00.5.42h3.84a.5.5 0 00.5-.42l.36-2.54c.58-.24 1.13-.56 1.63-.94l2.39.96a.5.5 0 00.6-.22l1.92-3.32a.5.5 0 00-.12-.64l-2.03-1.58zM12 15.5A3.5 3.5 0 1112 8a3.5 3.5 0 010 7.5z"/></svg>
        </span>
        <span>Settings</span>
      </a>
    </div>
    <div class="sidebar-bottom">
      <button type="button" class="sidebar-item logout" onclick="handleLogout()">
        <span class="sidebar-icon icon-badge" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M10 17l1.41-1.41L8.83 13H20v-2H8.83l2.58-2.59L10 7l-7 7 7 7zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
        </span>
        <span>Logout</span>
      </button>
    </div>
  </aside>

  <main class="main-content">
    <div class="content-card">
      <h1>
        <span class="feature-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M10 2a8 8 0 105.293 14.293l4.707 4.707 1.414-1.414-4.707-4.707A8 8 0 0010 2zm0 2a6 6 0 110 12 6 6 0 010-12z"/></svg>
        </span>
        Search Bus
      </h1>

      <form id="searchForm" class="search-form">
        <div class="form-group">
          <label for="from">Source</label>
          <select id="from" name="from" required>
            <option value="">Select source</option>
          </select>
        </div>
        <div class="search-arrow-wrap">
          <span class="search-arrow">-></span>
        </div>
        <div class="form-group">
          <label for="to">Destination</label>
          <select id="to" name="to" required>
            <option value="">Select destination</option>
          </select>
        </div>
        <button type="submit" class="btn btn-success">Search</button>
      </form>

      <div id="resultsContainer" style="display:none;">
        <p id="resultsHeading" class="results-route-heading"></p>
        <table class="bus-table">
          <thead>
            <tr>
              <th>Bus Number</th>
              <th>Route</th>
              <th>Departure</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="busResults"></tbody>
        </table>
      </div>

      <div id="noResults" style="display:none; text-align:center; padding:32px; color: var(--text-secondary); font-size:14px;">
        No buses found for this route. Try different locations.
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script>
    var fromSelect = document.getElementById('from');
    var toSelect = document.getElementById('to');
    var searchForm = document.getElementById('searchForm');
    var resultsContainer = document.getElementById('resultsContainer');
    var busResults = document.getElementById('busResults');
    var noResults = document.getElementById('noResults');

    function formatRouteLabel(route, from, to) {
      var selectedSegment = (route.from || from) + ' -> ' + (route.to || to);
      var baseRoute = route.routeName ? String(route.routeName).trim() : '';
      if (!baseRoute || baseRoute === selectedSegment) return selectedSegment;
      return baseRoute + ' (' + selectedSegment + ')';
    }

    function loadStops() {
      fromSelect.disabled = true;
      toSelect.disabled = true;
      fetchStops().then(function(stops) {
        fromSelect.innerHTML = '<option value="">Select source</option>';
        toSelect.innerHTML = '<option value="">Select destination</option>';
        (stops || []).forEach(function(stop) {
          fromSelect.add(new Option(stop, stop));
          toSelect.add(new Option(stop, stop));
        });
      }).catch(function() {
        // fallback already handled in fetchStops()
      }).finally(function() {
        fromSelect.disabled = false;
        toSelect.disabled = false;
      });
    }

    searchForm.addEventListener('submit', function(e) {
      e.preventDefault();
      var from = fromSelect.value.trim();
      var to = toSelect.value.trim();
      if (!from || !to) { alert('Please select both source and destination'); return; }
      if (from === to) { alert('Source and destination must be different'); return; }
      searchRoutes(from, to).then(function(routes) {
        displayResults(routes || [], from, to);
      }).catch(function(err) {
        if (typeof isAuthError === 'function' && isAuthError(err)) {
          return;
        }
        console.error(err);
        alert('Error searching routes.');
      });
    });

    function displayResults(routes, from, to) {
      busResults.innerHTML = '';
      if (routes.length === 0) {
        resultsContainer.style.display = 'none';
        noResults.style.display = 'block';
        return;
      }
      noResults.style.display = 'none';
      resultsContainer.style.display = 'block';
      var heading = document.getElementById('resultsHeading');
      if (heading) heading.textContent = 'Routes - Source ' + from + ' -> Destination ' + to;
      var seen = new Set();
      routes.forEach(function(route) {
        var timeStr = route.departureTime ? route.departureTime : 'N/A';
        var busNum = route.busNumber ? route.busNumber : 'N/A';
        var segmentFrom = route.from || from;
        var segmentTo = route.to || to;
        var routeLabel = formatRouteLabel(route, from, to);
        var key = (busNum + '|' + routeLabel).toLowerCase();
        if (seen.has(key)) {
          return;
        }
        seen.add(key);
        var row = document.createElement('tr');
        row.innerHTML = '<td><strong>' + busNum + '</strong></td><td>' + routeLabel + '</td><td>' + timeStr + '</td><td><button type="button" class="btn btn-warning" data-id="' + route._id + '" data-from="' + segmentFrom + '" data-to="' + segmentTo + '" data-bus="' + busNum + '">View Details</button></td>';
        row.querySelector('.btn-warning').addEventListener('click', function() {
          var p = new URLSearchParams({ id: this.dataset.id });
          if (this.dataset.from) p.set('from', this.dataset.from);
          if (this.dataset.to) p.set('to', this.dataset.to);
          if (this.dataset.bus && this.dataset.bus !== 'N/A') p.set('bus', this.dataset.bus);
          window.location.href = 'bus-details.html?' + p.toString();
        });
        busResults.appendChild(row);
      });
    }

    function handleLogout() {
      if (confirm('Logout?')) {
        localStorage.removeItem('isLoggedIn');
        localStorage.removeItem('username');
        localStorage.removeItem('token');
        window.location.href = 'logout.html';
      }
    }

    ensureAuthenticated().then(function(ok) {
      if (!ok) return;
      loadStops();
    }).catch(function(err) {
      console.error(err);
      alert('Error loading stops.');
    });
  </script>
</body>
</html>
